services:
  - type: web
    name: ecn-conflict-backend
    runtime: python
    rootDir: ecn_conflict_demo/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # means: set manually in Render dashboard (secret)
      - key: PYTHON_VERSION
        value: 3.12.0
